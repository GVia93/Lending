events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Кэширование статических файлов
    sendfile on;
    tcp_nopush on;

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Для SPA - все запросы направляем на index.html
        location / {
            try_files $uri $uri/ /index.html;
            expires -1;  # Не кэшировать HTML
        }

        # Статические файлы с долгим кэшированием
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API прокси
        location /api/ {
            proxy_pass http://m-stroy-app:8001/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # FastAPI docs
        location /docs {
            proxy_pass http://m-stroy-app:8001/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://m-stroy-app:8001/openapi.json;
            proxy_set_header Host $host;
        }
    }
}